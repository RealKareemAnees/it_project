<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us - Personal Course Organizer</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>
  <header>
    <h1>Personal Course Organizer</h1>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">My Courses</a></li>
      <li><a href="add-course.html">Add Course</a></li>
      <li><a href="contact.html" class="active">Contact Us</a></li>
    </ul>
  </nav>

  <main>
    <section>
      <h2>Contact Us</h2>
    
    
    </section>

    <section>
      <h3>Contact Information</h3>
      <p>
        <strong>Email:</strong> <a href="mailto:support@gmail.com">support@gmail.com</a>
      </p>
      <p>
        <strong>Phone:</strong> <a href="tel:123">123😊</a>
      </p>
  
    </section>

    <section>
      <h3>Send us a Message</h3>
      <form>
        <fieldset>
          <legend>Contact Form</legend>

          <label for="name">Your Name *</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Your name"
            required
          >

          <label for="email">Email Address *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="gmail@gmail.com"
            required
          >

          <label for="subject">Subject *</label>
          <input 
            type="text" 
            id="subject" 
            name="subject" 
            placeholder="What is this about?"
            required
          >

          <label for="message">Message *</label>
          <textarea 
            id="message" 
            name="message" 
            placeholder="Please share your message with us"
            required
          ></textarea>
        </fieldset>

        <button type="submit">Send Message</button>
        <button type="reset" style="background-color: var(--text-light); margin-left: 0.5rem;">Clear Form</button>
      </form>
    </section>

  </main>
  <footer>
    <p>made by Kareem Anees: 20250762</p>
  </footer>
</body>
</html>
