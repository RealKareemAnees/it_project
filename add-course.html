<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Course - Personal Course Organizer</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="add-course.css">
</head>
<body>
  <header>
    <h1>Personal Course Organizer</h1>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">My Courses</a></li>
      <li><a href="add-course.html" class="active">Add Course</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <main>
    <section>
      <h2>Add a New Course</h2>
      <p>Fill out the form below to add a new course to your organizer.</p>

      <form>
        <fieldset>
          <legend>Course Information</legend>

          <label for="course-name">Course Name *</label>
          <input 
            type="text" 
            id="course-name" 
            name="course-name" 
            placeholder="e.g., Introduction to Database Design"
            required
          >

          <label for="instructor">Instructor Name *</label>
          <input 
            type="text" 
            id="instructor" 
            name="instructor" 
            placeholder="e.g., Dr. Jane Adams"
            required
          >

          <label for="credit-hours">Credit Hours *</label>
          <input 
            type="number" 
            id="credit-hours" 
            name="credit-hours" 
            min="0" 
            max="12"
            placeholder="e.g., 3"
            required
          >

          <label for="notes">Notes</label>
          <textarea 
            id="notes" 
            name="notes" 
            placeholder="Add any additional notes about this course (optional)"
          ></textarea>
        </fieldset>

        <button type="submit">Add Course</button>
        <button type="reset">Clear Form</button>
      </form>
    </section>
  </main>
  <footer>
    <p>made by Kareem Anees: 20250762</p>
  </footer>
</body>
</html>
